<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="none">
    <title>設定 - Narou.rs WEB UI</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%232b4c7e'/%3E%3Ctext x='32' y='42' font-size='32' text-anchor='middle' fill='white' font-family='Arial,sans-serif'%3EN%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="/assets/css/theme.css">
    <link rel="stylesheet" href="/assets/css/base.css">
    <link rel="stylesheet" href="/assets/css/layout.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/responsive.css">
    <link rel="stylesheet" href="/assets/css/settings.css">
  </head>
  <body>
    <!-- Fixed Top Navbar -->
    <nav id="header-navbar" class="navbar navbar-fixed-top" role="navigation">
      <div class="navbar-inner">
        <div class="navbar-header">
          <a class="navbar-brand" href="/">Narou.rs WEB UI</a>
        </div>
        <div class="navbar-collapse">
          <ul class="nav navbar-nav">
            <li><a href="/">← 小説リストに戻る</a></li>
          </ul>
          <ul class="nav navbar-nav navbar-right">
            <li>
              <button type="button" id="btn-save-settings" class="btn btn-primary navbar-btn">
                設定を保存
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container container-main settings-container">
      <!-- Tab navigation pills -->
      <ul class="nav nav-pills settings-tabs" id="settings-tabs" role="tablist">
        <!-- Tabs injected by JS -->
      </ul>

      <!-- Tab content -->
      <div class="tab-content" id="settings-tab-content">
        <!-- Tab panes injected by JS -->
      </div>

      <!-- Bottom save button -->
      <div class="settings-bottom-save">
        <button type="button" id="btn-save-settings-bottom" class="btn btn-primary">
          設定を保存
        </button>
      </div>
    </div>

    <!-- Toast notification -->
    <div id="settings-toast" class="settings-toast" style="display:none;"></div>

    <script src="/assets/js/settings.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>narou.rs - 個別設定</title>
<link rel="stylesheet" href="/assets/css/theme.css">
<link rel="stylesheet" href="/assets/css/base.css">
<link rel="stylesheet" href="/assets/css/layout.css">
<style>
.ns-container { max-width: 56em; margin: 1.5em auto; padding: 0 var(--container-padding); }
.ns-container h1 { border-bottom: 0.15em solid var(--btn-primary-bg); padding-bottom: .3em; font-size: 1.4em; }
.loading { color: var(--text-muted); }
.error { color: var(--btn-danger-bg); }
.ns-container table { border-collapse: collapse; width: 100%; margin: 1em 0; }
.ns-container th, .ns-container td { border: 0.07em solid var(--border-color); padding: .5em .7em; text-align: left; }
.ns-container th { background: var(--table-header-bg); color: var(--table-header-text); width: 30%; }
.ns-container input[type=text], .ns-container input[type=number], .ns-container select {
  width: 100%; padding: .3em; box-sizing: border-box;
  color: var(--text-color); background-color: var(--input-bg); border: 0.07em solid var(--input-border); border-radius: var(--border-radius);
}
.ns-container input[type=checkbox] { transform: scale(1.2); }
.actions { margin: 1.5em 0; }
.btn { padding: .5em 1.5em; background: var(--btn-primary-bg); color: var(--btn-text); border: none; border-radius: var(--border-radius); cursor: pointer; font-size: 1em; }
.btn:hover { opacity: 0.85; }
.btn-secondary { background: var(--text-muted); }
.btn-secondary:hover { opacity: 0.85; }
.msg { margin: .5em 0; padding: .5em; border-radius: var(--border-radius); }
.msg-success { background: var(--btn-success-bg); color: var(--btn-text); }
.msg-error { background: var(--btn-danger-bg); color: var(--btn-text); }
</style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-brand" href="/">Narou.rs</a>
  </div>
</nav>
<div class="ns-container">
<h1 id="page-title">個別設定</h1>
<div id="content"><p class="loading">読み込み中...</p></div>
<div class="actions">
  <button class="btn" id="save-btn" style="display:none">保存</button>
  <button class="btn btn-secondary" onclick="location.href='/'">戻る</button>
</div>
<div id="msg"></div>
</div>

<script>
(async () => {
  const path = location.pathname;
  const m = path.match(/^\/novels\/(\d+)\/setting$/);
  if (!m) { document.getElementById('content').innerHTML = '<p class="error">不正なURL</p>'; return; }
  const id = m[1];

  try {
    const resp = await fetch(`/api/settings/${id}`);
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();
    document.getElementById('page-title').textContent = `個別設定: ${data.title || 'ID ' + id}`;
    renderSettings(data);
    document.getElementById('save-btn').style.display = '';
    document.getElementById('save-btn').addEventListener('click', () => saveSettings(id));
  } catch (e) {
    document.getElementById('content').innerHTML = `<p class="error">${e.message}</p>`;
  }
})();

function renderSettings(data) {
  const skip = new Set(['id','title','author','archive_path','replace_patterns']);
  const entries = Object.entries(data).filter(([k]) => !skip.has(k));
  if (entries.length === 0) {
    document.getElementById('content').innerHTML = '<p>設定項目がありません</p>';
    return;
  }
  let html = '<table>';
  for (const [key, val] of entries) {
    html += `<tr><th>${esc(key)}</th><td>${inputFor(key, val)}</td></tr>`;
  }
  html += '</table>';
  document.getElementById('content').innerHTML = html;
}

function inputFor(key, val) {
  const id = `setting-${key}`;
  if (typeof val === 'boolean') {
    return `<input type="checkbox" id="${id}" data-key="${esc(key)}" data-type="bool" ${val ? 'checked' : ''}>`;
  }
  if (typeof val === 'number') {
    return `<input type="number" id="${id}" data-key="${esc(key)}" data-type="number" value="${val}">`;
  }
  const s = val == null ? '' : String(val);
  return `<input type="text" id="${id}" data-key="${esc(key)}" data-type="string" value="${esc(s)}">`;
}

async function saveSettings(id) {
  const body = {};
  document.querySelectorAll('[data-key]').forEach(el => {
    const key = el.dataset.key;
    if (el.dataset.type === 'bool') body[key] = el.checked;
    else if (el.dataset.type === 'number') body[key] = Number(el.value);
    else body[key] = el.value;
  });
  try {
    const resp = await fetch(`/api/settings/${id}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const result = await resp.json();
    const msg = document.getElementById('msg');
    msg.className = result.success ? 'msg msg-success' : 'msg msg-error';
    msg.textContent = result.message || (result.success ? '保存しました' : 'エラー');
  } catch (e) {
    const msg = document.getElementById('msg');
    msg.className = 'msg msg-error';
    msg.textContent = e.message;
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
</script>
</body>
</html>

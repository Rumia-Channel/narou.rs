<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>メモ帳 - Narou.rb WEB UI</title>
  <link rel="stylesheet" href="/assets/css/theme.css">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <style>
    .notepad-container {
      max-width: 56em;
      margin: 1.5em auto;
      padding: 0 var(--container-padding);
    }
    .notepad-container h1 {
      font-size: 1.6em;
      margin-bottom: 0.5em;
    }
    .notepad-container ul {
      color: var(--text-muted);
      margin-bottom: 1em;
      padding-left: 1.5em;
    }
    #notepad {
      width: 100%;
      min-height: 24em;
      padding: 0.6em;
      font-size: var(--base-font-size);
      color: var(--text-color);
      background-color: var(--input-bg);
      border: 0.07em solid var(--input-border);
      border-radius: var(--border-radius);
      resize: vertical;
    }
    #notepad:focus {
      border-color: var(--btn-primary-bg);
      outline: none;
    }
    .notepad-status {
      margin-top: 0.4em;
      font-size: 0.85em;
      color: var(--text-muted);
    }
    .notepad-status.error {
      color: var(--danger-color);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a class="navbar-brand" href="/">Narou.rb</a>
    </div>
  </nav>
  <div class="notepad-container">
    <h1>メモ帳</h1>
    <ul>
      <li>編集したら自動でサーバに保存されます</li>
      <li>別のブラウザで開いていても内容をリアルタイムに同期します</li>
    </ul>
    <textarea id="notepad"></textarea>
    <div class="notepad-status" id="notepad-status"></div>
  </div>
  <script>
    (function() {
      var textarea = document.getElementById('notepad');
      var status = document.getElementById('notepad-status');
      var saveTimer = null;
      var statusTimer = null;
      var notepadObjectId = null;

      function showStatus(message, isError) {
        status.classList.toggle('error', Boolean(isError));
        status.textContent = message;
        if (statusTimer) clearTimeout(statusTimer);
        statusTimer = setTimeout(function() {
          if (status.textContent === message) {
            status.textContent = '';
            status.classList.remove('error');
          }
        }, 2000);
      }

      function requestJson(url, options) {
        return fetch(url, options).then(function(response) {
          if (!response.ok) {
            throw new Error('HTTP ' + response.status);
          }
          return response.json();
        });
      }

      function assertApiSuccess(data, fallbackMessage) {
        if (!data || data.success === false) {
          throw new Error((data && data.message) || fallbackMessage);
        }
        return data;
      }

      function readNotepadPayload(data) {
        return {
          text: (data && (data.text || data.content)) || '',
          objectId: (data && typeof data.object_id === 'string') ? data.object_id : null
        };
      }

      function applyNotepadPayload(data, keepLocalEdits) {
        var payload = readNotepadPayload(data);
        var hasLocalEdits = keepLocalEdits
          && document.activeElement === textarea
          && textarea.value !== payload.text;
        if (!hasLocalEdits) {
          textarea.value = payload.text;
          notepadObjectId = payload.objectId;
        }
        return !hasLocalEdits;
      }

      function reloadNotepad(message) {
        return requestJson('/api/notepad/read')
          .then(function(data) {
            applyNotepadPayload(data, false);
            if (message) {
              showStatus(message, true);
            }
          });
      }

      requestJson('/api/notepad/read')
        .then(function(data) {
          applyNotepadPayload(data, false);
        })
        .catch(function(error) {
          showStatus('読み込みに失敗しました: ' + error.message, true);
        });

      function connectWebSocket(wsPort) {
        var url = new URL('/ws', location.href);
        url.protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        var ws = new WebSocket(url.toString());
        ws.onmessage = function(event) {
          try {
            var msg = JSON.parse(event.data);
            if (msg.type === 'notepad.change') {
              var applied = applyNotepadPayload(msg.data, true);
              if (applied) {
                showStatus('他の画面の変更を反映しました');
              } else {
                showStatus('他の画面で更新されました。保存時に再読み込みします', true);
              }
            }
          } catch (_) {}
        };
        ws.onclose = function() { setTimeout(function() { connectWebSocket(wsPort); }, 5000); };
      }

      fetch('/api/webui/config')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data && data.ws_port) connectWebSocket(data.ws_port);
        });

      textarea.addEventListener('input', function() {
        if (saveTimer) clearTimeout(saveTimer);
        status.textContent = '';
        status.classList.remove('error');
        saveTimer = setTimeout(function() {
          requestJson('/api/notepad/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: textarea.value, object_id: notepadObjectId })
          }).then(function(data) {
            if (data && data.conflict) {
              return reloadNotepad(data.message || '他の画面で変更されたため再読み込みしました');
            }
            data = assertApiSuccess(data, '保存に失敗しました');
            applyNotepadPayload(data, false);
            showStatus(data.message || '保存しました');
          }).catch(function(error) {
            showStatus('保存に失敗しました: ' + error.message, true);
          });
        }, 500);
      });
    })();
  </script>
</body>
</html>

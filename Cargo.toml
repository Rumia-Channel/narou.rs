[package]
name = "narou_rs"
version = "0.1.0"
edition = "2024"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
regex = "1"
reqwest = { version = "0.12", features = ["cookies", "gzip", "brotli", "deflate", "blocking"] }
axum = { version = "0.8", features = ["macros", "ws"] }
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
sha2 = "0.10"
hex = "0.4"
thiserror = "2"
askama = "0.12"
clap = { version = "4", features = ["derive"] }
open = "5"
tracing = "0.1"
tracing-subscriber = "0.3"
parking_lot = "0.12"
dashmap = "6"
tower-http = { version = "0.6", features = ["cors"] }
futures = "0.3"
pest = "2.8.6"
pest_derive = "2.8.6"
ua_generator = { git = "https://github.com/spider-rs/ua_generator.git", version = "0.5.56" }

# ------------------------------------------------------------
# 小説サイト定義
name: &name カクヨム
scheme: https
domain: kakuyomu.jp
top_url: \\k<scheme>://\\k<domain>
url: \\k<top_url>/works/(?<ncode>\d+)
encoding: UTF-8
confirm_over18: no
append_title_to_folder_name: yes
title_strip_pattern: null
sitename: *name
version: 2.2

# ------------------------------------------------------------
# 前処理設定 (DSL — pest parser で実行)
# HTMLに埋め込まれたJSONを抽出し、正規表現で取得可能なテキストに変換
preprocess: |-
  guard "KakuyomuPreprocessEvalMagicWord"

  let json = extract_json(/<script id="__NEXT_DATA__" type="application\/json">(.+?)<\/script>/s)

  let data = json.props.pageProperties.__APOLLO_STATE__
  let work_id = json.query.workId
  let work = data["Work:${work_id}"]

  # TOC: resolve refs → extract chapter/episode pairs → resolve again → format
  let toc = work.tableOfContents || work.tableOfContentsV2
  let toc = toc.map { |item| data[item.__ref] }
  let toc = toc.flat_map { |item| [item.chapter, item.episodeUnions] }
  let toc = toc.compact
  let toc = toc.map { |item| data[item.__ref] }
  let toc = toc.map { |item| "${item.__typename};${item.level};${item.id};${item.publishedAt};${item.title}" }

  # Author: resolve __ref → activityName
  let author_ref = work.author.__ref
  let author_name = data[author_ref].activityName
  set work.author = author_name
  if work.alternateAuthorName
    set work.author = "${work.alternateAuthorName}／${author_name}"
  end

  # Introduction: \n → <br>
  set work.introduction = work.introduction.replace("\n", "<br>")

  # Tags
  if work.tagLabels && work.tagLabels.is_array && !work.tagLabels.empty
    set work.tagLabels = work.tagLabels.map { |tag| "tag::${tag}" }.join("\n")
  else
    set work.tagLabels = ""
  end

  # Generate output block
  emit "<!---"
  emit "KakuyomuPreprocessEvalMagicWord"
  emit "title::${work.title}"
  emit "author::${work.author}"
  emit "introduction::${work.introduction}"
  emit "serialStatus::${work.serialStatus}"
  emit "publicEpisodeCount::${work.publicEpisodeCount}"
  emit "publishedAt::${work.publishedAt}"
  emit "editedAt::${work.editedAt}"
  emit "lastEpisodePublishedAt::${work.lastEpisodePublishedAt}"
  emit "totalCharacterCount::${work.totalCharacterCount}"

  for tag in work.tagLabels
    emit tag
  end

  for entry in toc
    emit entry
  end

  emit "--->"
  insert_at_match

# ------------------------------------------------------------
# 書籍情報取得設定
title: &title ^title::(?<title>.+?)$
author: ^author::(?<author>.+?)$
story: &story ^introduction::(?<story>.+?)$

# ------------------------------------------------------------
# 目次取得設定
toc_url: \\k<top_url>/works/\\k<ncode>
subtitles: |-
  (?x)
  ^(?:Chapter;1;\d+;(?<chapter>.+?)\n)?
  (?:Chapter;2;\d+;(?<subchapter>.+?)\n)?
  Episode;(?<index>\d+);(?<subupdate>.+?);(?<subtitle>.+?)$
href: /works/\\k<ncode>/episodes/\\k<index>

# ------------------------------------------------------------
# 本文取得設定

body_pattern: <div class="widget-episodeBody js-episode-body".*?>(?<body>.+?)</div>
introduction_pattern: null
postscript_pattern: null

# ------------------------------------------------------------
# 小説情報からパースするための設定
novel_info_url: \\k<toc_url>

# タイトル
t: *title

# novel_type 小説種別
nt: ^serialStatus::(?<novel_type>.+?)$
novel_type_string:
  RUNNING: 1
  COMPLETED: 3

# general_all_no 掲載話数
ga: ^publicEpisodeCount::(?<general_all_no>.+?)$

# story あらすじ
s: *story

# general_firstup 初回掲載日
gf: ^publishedAt::(?<general_firstup>.+?)$

# novelupdated_at 小説の更新時刻
nu: ^editedAt::(?<novelupdated_at>.+?)$

# general_lastup 最新話掲載日
gl: ^lastEpisodePublishedAt::(?<general_lastup>.+?)$

# writer 作者名
w: ^author::(?<writer>.+?)$

# length 文字数
l: ^totalCharacterCount::(?<length>.+?)$

# tags タグ
tags: ^tag::(?<tag>.+?)$
